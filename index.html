<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Fake Photo</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f13;
    color: #fff;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
  }

  h1 { font-size: 1.4rem; font-weight: 600; color: #aaa; letter-spacing: 0.05em; }

  #camera-wrap {
    position: relative;
    width: min(400px, 100%);
    border-radius: 16px;
    overflow: hidden;
    background: #1a1a22;
    box-shadow: 0 0 0 1px #ffffff12;
  }

  video { width: 100%; display: block; }

  canvas { display: none; }

  #result {
    width: min(400px, 100%);
    background: #1a1a22;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 0 0 1px #ffffff12;
    transition: border-color 0.3s;
  }

  #label {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: color 0.3s;
  }

  #score-bar-wrap {
    margin-top: 16px;
    background: #0f0f13;
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  #score-bar {
    height: 100%;
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s ease, background 0.4s ease;
  }

  #score-text {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #666;
  }

  #status {
    font-size: 0.8rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>

<h1>SPOT THE FAKE PHOTO</h1>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="224" height="224"></canvas>
</div>

<div id="result">
  <div id="label">Loading…</div>
  <div id="score-bar-wrap"><div id="score-bar"></div></div>
  <div id="score-text"></div>
</div>

<div id="status">Starting camera…</div>

<script>
const MEAN = [0.485, 0.456, 0.406];
const STD  = [0.229, 0.224, 0.225];

const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const label     = document.getElementById('label');
const bar       = document.getElementById('score-bar');
const scoreText = document.getElementById('score-text');
const status    = document.getElementById('status');

function softmax(a, b) {
  const ea = Math.exp(a), eb = Math.exp(b);
  return [ea / (ea + eb), eb / (ea + eb)];
}

function preprocess() {
  ctx.drawImage(video, 0, 0, 224, 224);
  const { data } = ctx.getImageData(0, 0, 224, 224);
  const tensor = new Float32Array(3 * 224 * 224);
  for (let i = 0; i < 224 * 224; i++) {
    tensor[i]               = (data[i*4]   / 255 - MEAN[0]) / STD[0]; // R
    tensor[224*224 + i]     = (data[i*4+1] / 255 - MEAN[1]) / STD[1]; // G
    tensor[2*224*224 + i]   = (data[i*4+2] / 255 - MEAN[2]) / STD[2]; // B
  }
  return tensor;
}

function showResult(screenProb) {
  const pct = Math.round(screenProb * 100);
  const isScreen = screenProb > 0.5;

  label.textContent     = isScreen ? 'SCREEN' : 'REAL';
  label.style.color     = isScreen ? '#f87171' : '#4ade80';
  bar.style.width       = pct + '%';
  bar.style.background  = isScreen ? '#f87171' : '#4ade80';
  scoreText.textContent = `Screen probability: ${pct}%`;
}

async function run() {
  status.textContent = 'Loading model…';

  ort.env.wasm.numThreads = 1;
  ort.env.wasm.wasmPaths  = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/';

  let session;
  try {
    session = await ort.InferenceSession.create('cnn_model.onnx');
  } catch(e) {
    status.textContent = 'Model error: ' + e.message;
    return;
  }

  status.textContent = 'Starting camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    status.textContent = 'Camera access denied.';
    return;
  }

  status.textContent = 'Running…';

  setInterval(async () => {
    if (video.readyState < 2) return;
    const tensor = preprocess();
    const input  = new ort.Tensor('float32', tensor, [1, 3, 224, 224]);
    const out    = await session.run({ input });
    const logits = out.output.data;
    const [, screenProb] = softmax(logits[0], logits[1]);
    showResult(screenProb);
  }, 800);
}

run();
</script>
</body>
</html>
